<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daftar Akun - Rumah Kucing</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,400">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/fontawesome-all.min.css">
  <link rel="stylesheet" href="css/templatemo-style.css">
  
  <style>
    body {
      background: #cbbca9; /* Warna cokelat muda serasi dengan web kamu */
      font-family: 'Open Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .register-container {
      background: rgba(0, 0, 0, 0.75);
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      color: white;
    }
    .register-container h3 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 300;
      letter-spacing: 1px;
    }
    .form-group label {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 5px;
      display: block;
    }
    .form-control {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 20px;
    }
    .form-control:focus {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border-color: #8cc63f;
      box-shadow: none;
    }
    .btn-register {
      background: white;
      color: #333;
      border: none;
      width: 100%;
      padding: 12px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }
    .btn-register:hover {
      background: #8cc63f;
      color: white;
    }
    .social-area {
      display: flex;
      justify-content: space-between;
      margin-top: 25px;
      font-size: 13px;
    }
    .social-area a {
      color: white;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.15);
      padding: 6px 15px;
      border-radius: 4px;
    }
    .social-area .google-btn {
      background: #df4a32;
      padding: 6px 15px;
      border-radius: 4px;
    }
    #message {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="register-container">
    <form id="registerForm">
      <h3>Register</h3>
      
      <div class="form-group">
        <label for="username">Nama Pengguna</label>
        <input type="text" id="username" class="form-control" placeholder="Username" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="form-control" placeholder="Email" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Password" required>
      </div>
      
      <button type="submit" class="btn-register">Daftar</button>
      
      <div class="social-area">
        <div><a href="index.html">Login</a></div>
        <div class="google-btn"><i class="fab fa-google"></i> with Google</div>
      </div>
      
      <p id="message"></p>
    </form>
  </div>

  <script src="login/js/register.js" defer></script>

</body>
</html>
